<div class="flex items-center w-full h-full space-x-4">
  <div class="relative flex-1 h-full">
    <input
      type="text"
      placeholder="Ask AI for specific feedback (e.g., 'Focus on security flaws'...)"
      class="w-full h-full bg-slate-950 border border-slate-800 rounded-xl px-4 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
    />
  </div>

  <button
  [disabled]="codeReview.isLoading()"
    (click)="sendCode()"
    class="h-full px-6 bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm rounded-xl transition-all duration-200 flex items-center justify-center space-x-2 shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 active:scale-[0.98] shrink-0"
  >
    <span>  @if(codeReview.isLoading()) {
    Analyzing...
  } @else {
    Analyze Code
  }</span>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M14 5l7 7m0 0l-7 7m7-7H3"
      ></path>
    </svg>
  </button>
</div>
