<div class="flex flex-col h-full w-full">
  <div class="flex items-center justify-between h-16 px-4 border-b border-slate-800 shrink-0">
    <div class="flex items-center space-x-2">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span class="text-sm font-semibold text-slate-200">Review History</span>
    </div>
    <span class="text-xs bg-slate-800 px-2 py-0.5 rounded text-slate-400 font-mono">4 items</span>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">



    @for (
    item of reviewHistory.reviews();
    track $index
    ) { <div class="p-3 bg-slate-850 border border-slate-750 rounded-lg cursor-pointer transition-colors" (click)="reviewHistory.restore(item)">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-medium text-blue-400 font-mono truncate max-w-[120px]"> {{ item.language }}</span>
        <span class="text-[10px] text-slate-500">{{ item.timestamp | date: 'shortTime'   }}</span>
      </div>
      <p class="text-xs text-slate-400 truncate">Refactored JWT verification logic...</p>
    </div>
    }
    

  </div>
</div>
